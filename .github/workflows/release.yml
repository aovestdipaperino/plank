name: Release

# Channel model: the highest MAJOR.MINOR series is always the beta channel.
# A release whose major.minor == the highest across all tags goes to the
# `plank-agent-beta` Homebrew formula; anything below that is a stable release
# and updates the `plank-agent` formula. Promotion (promote.yml) flips the
# current beta series to stable and opens the next minor as the new beta,
# so beta work accumulates as patch releases within one minor series.
#
# Homebrew (aovestdipaperino/homebrew-tap) is the ONLY distribution
# channel — plank is macOS-only and is not published to crates.io.

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  channel:
    name: Determine channel
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.detect.outputs.channel }}
      version: ${{ steps.detect.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect channel from major.minor series
        id: detect
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SERIES=$(echo "$VERSION" | cut -d. -f1,2)
          # Highest major.minor across all tags, compared numerically on both
          # components so 2.10 sorts above 2.9.
          MAX_SERIES=$(git tag -l 'v*' | sed 's/^v//' | cut -d. -f1,2 \
            | sort -t. -k1,1n -k2,2n -u | tail -1)
          if [ "$SERIES" = "$MAX_SERIES" ]; then
            CHANNEL=beta
          else
            CHANNEL=stable
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "Release $VERSION (series $SERIES, highest series $MAX_SERIES) -> $CHANNEL"

  build:
    name: Build ${{ matrix.name }}
    needs: channel
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos-15 runners: the ds4 Metal backend needs the macOS 15 SDK
          # (MTLResidencySet). cpu_flag overrides the ds4 Makefile's
          # `-mcpu=native` default with a portable baseline for bottles.
          - name: aarch64-macos
            runner: macos-15
            target: aarch64-apple-darwin
            bottle_tag: arm64_sequoia
            cpu_flag: "-mcpu=apple-m1"
          - name: x86_64-macos
            runner: macos-15-intel
            target: x86_64-apple-darwin
            bottle_tag: sequoia
            cpu_flag: "-march=x86-64-v3"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        env:
          NATIVE_CPU_FLAG: ${{ matrix.cpu_flag }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary archive
        run: |
          cd target/${{ matrix.target }}/release
          tar czf "../../../plank-${GITHUB_REF_NAME}-${{ matrix.name }}.tar.gz" plank
          cd ../../..

      - name: Upload binary archive to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$GITHUB_REF_NAME" "plank-${GITHUB_REF_NAME}-${{ matrix.name }}.tar.gz" --clobber

      # Bottles are packaged under BOTH formula names on beta releases so
      # that promote.yml can later publish the stable formula from the same
      # release assets without rebuilding. (A Homebrew bottle's inner
      # directory must match the formula name.)
      - name: Package Homebrew bottles
        run: |
          VERSION="${{ needs.channel.outputs.version }}"
          BOTTLE_TAG="${{ matrix.bottle_tag }}"
          for NAME in plank-agent plank-agent-beta; do
            if [ "$NAME" = "plank-agent-beta" ] && [ "${{ needs.channel.outputs.channel }}" != "beta" ]; then
              continue
            fi
            mkdir -p "$NAME/$VERSION/bin" "$NAME/$VERSION/share/plank/metal"
            cp target/${{ matrix.target }}/release/plank "$NAME/$VERSION/bin/plank"
            chmod +x "$NAME/$VERSION/bin/plank"
            # The engine compiles its Metal kernels from source at model load;
            # the binary falls back to ../share/plank/metal relative to itself
            # when the compile-time path (the CI checkout) is gone.
            cp refs/ds4/metal/*.metal "$NAME/$VERSION/share/plank/metal/"
            tar czf "$NAME-$VERSION.$BOTTLE_TAG.bottle.tar.gz" "$NAME/"
          done

      - name: Upload bottle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bottle-${{ matrix.bottle_tag }}
          path: "*.bottle.tar.gz"

  update-homebrew:
    name: Update Homebrew tap
    needs: [channel, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download bottle artifacts
        uses: actions/download-artifact@v4
        with:
          path: bottles
          merge-multiple: true

      - name: Upload bottles to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for f in bottles/*.bottle.tar.gz; do
            gh release upload "$GITHUB_REF_NAME" "$f" --clobber --repo "$GITHUB_REPOSITORY"
          done

      - name: Download source tarball
        run: curl -sL "https://github.com/${{ github.repository }}/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz" -o source.tar.gz

      - name: Compute SHA256 hashes
        id: hashes
        run: |
          VERSION="${{ needs.channel.outputs.version }}"
          CHANNEL="${{ needs.channel.outputs.channel }}"
          FORMULA_NAME=$([ "$CHANNEL" = "beta" ] && echo plank-agent-beta || echo plank-agent)
          echo "formula_name=$FORMULA_NAME" >> "$GITHUB_OUTPUT"
          echo "source_sha=$(sha256sum source.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          for tag in arm64_sequoia sequoia; do
            sha=$(sha256sum "bottles/$FORMULA_NAME-$VERSION.$tag.bottle.tar.gz" | awk '{print $1}')
            echo "${tag}_sha=$sha" >> "$GITHUB_OUTPUT"
          done

      - name: Update formula
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.channel.outputs.version }}"
          CHANNEL="${{ needs.channel.outputs.channel }}"
          FORMULA_NAME="${{ steps.hashes.outputs.formula_name }}"
          SOURCE_SHA="${{ steps.hashes.outputs.source_sha }}"
          ARM64_SEQUOIA_SHA="${{ steps.hashes.outputs.arm64_sequoia_sha }}"
          SEQUOIA_SHA="${{ steps.hashes.outputs.sequoia_sha }}"

          if [ "$CHANNEL" = "beta" ]; then
            CLASS_NAME=PlankAgentBeta
            DESC="Interactive coding agent with a terminal REPL (beta channel)"
            EXTRA='  conflicts_with "plank-agent", because: "both install a plank binary"'
          else
            CLASS_NAME=PlankAgent
            DESC="Interactive coding agent with a terminal REPL (Rust port of ds4)"
            EXTRA=''
          fi

          git clone "https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/aovestdipaperino/homebrew-tap.git" tap

          cat > "tap/Formula/$FORMULA_NAME.rb" << EOF
          class $CLASS_NAME < Formula
            desc "$DESC"
            homepage "https://github.com/aovestdipaperino/plank"
            url "https://github.com/aovestdipaperino/plank/archive/refs/tags/v${VERSION}.tar.gz"
            sha256 "${SOURCE_SHA}"
            license "MIT"

            depends_on :macos
            depends_on "rust" => :build

            bottle do
              root_url "https://github.com/aovestdipaperino/plank/releases/download/v${VERSION}"
              sha256 cellar: :any_skip_relocation, arm64_sequoia: "${ARM64_SEQUOIA_SHA}"
              sha256 cellar: :any_skip_relocation, sequoia: "${SEQUOIA_SHA}"
            end
          ${EXTRA}
            def install
              system "cargo", "install", *std_cargo_args
              # Metal kernel sources are only present when building from a
              # checkout with the refs/ds4 submodule; the GitHub source tarball
              # lacks them (EchoEngine-only build).
              (pkgshare/"metal").install Dir["refs/ds4/metal/*.metal"] unless Dir["refs/ds4/metal/*.metal"].empty?
            end

            test do
              system "#{bin}/plank", "--help"
            end
          end
          EOF

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "Formula/$FORMULA_NAME.rb"
          git diff --cached --quiet || git commit -m "$FORMULA_NAME ${VERSION}"
          git push
