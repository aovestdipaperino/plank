name: Promote beta to stable

# Channel-by-patch scheme (see VERSIONING.md): `vX.Y.0` is stable, `vX.Y.Z`
# with Z >= 1 is beta. Promotion closes the current series and opens the next
# minor with a stable/beta pair:
#
#   1. Finds the highest tagged MAJOR.MINOR series (e.g. 2.5, latest v2.5.3).
#   2. Bumps Cargo.toml on main to `<major>.<minor+1>.0`, commits, tags, and
#      publishes it as a FULL release — release.yml builds it fresh and points
#      the stable `plank-agent` formula at it.
#   3. Bumps again to `<major>.<minor+1>.1`, commits, tags, and publishes it
#      as a prerelease — release.yml seeds the new `plank-agent-beta` formula.
#
# The `.0` and `.1` releases are built from the same code (only the version
# differs), so the new beta starts exactly where the new stable is. Majors
# are never bumped here; a major bump is a deliberate, manual decision.
#
# Requires TAP_GITHUB_TOKEN to be a PAT with push access to BOTH
# aovestdipaperino/homebrew-tap and this repo: releases created with the
# default GITHUB_TOKEN would not trigger release.yml.

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency: promote

jobs:
  promote:
    name: Open next minor as stable + beta pair
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.TAP_GITHUB_TOKEN }}

      - name: Compute next series
        id: next
        run: |
          # Highest major.minor series, compared numerically on both
          # components so 2.10 sorts above 2.9.
          MAX_SERIES=$(git tag -l 'v*' | sed 's/^v//' | cut -d. -f1,2 \
            | sort -t. -k1,1n -k2,2n -u | tail -1)
          MAJOR="${MAX_SERIES%%.*}"
          MINOR="${MAX_SERIES#*.}"
          LATEST=$(git tag -l "v${MAX_SERIES}.*" | sed 's/^v//' | sort -V | tail -1)
          STABLE="${MAJOR}.$((MINOR + 1)).0"
          BETA="${MAJOR}.$((MINOR + 1)).1"
          echo "Promoting series $MAX_SERIES (latest v$LATEST): stable v$STABLE, new beta v$BETA"
          echo "stable=$STABLE" >> "$GITHUB_OUTPUT"
          echo "beta=$BETA" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Tag and release the stable .0 and beta .1
        env:
          GH_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          bump() {
            NEW="$1"
            sed -i "0,/^version = \".*\"/s//version = \"${NEW}\"/" Cargo.toml
            # Keep Cargo.lock in sync without needing a full toolchain.
            python3 - << PYEOF
          import re
          lock = open("Cargo.lock").read()
          lock = re.sub(r'(name = "plank"\nversion = )"[^"]+"', r'\g<1>"${NEW}"', lock)
          open("Cargo.lock", "w").write(lock)
          PYEOF
            git add Cargo.toml Cargo.lock
          }

          STABLE="${{ steps.next.outputs.stable }}"
          BETA="${{ steps.next.outputs.beta }}"

          bump "$STABLE"
          git commit -m "Promote v${{ steps.next.outputs.latest }} beta work to stable v${STABLE}"
          git tag "v${STABLE}"

          bump "$BETA"
          git commit -m "Open v${BETA} beta channel"
          git tag "v${BETA}"

          git push origin main "v${STABLE}" "v${BETA}"

          # Full release first so `Latest` lands on the stable; both created
          # with the PAT so release.yml fires for each.
          gh release create "v${STABLE}" \
            --title "v${STABLE}" \
            --notes "Stable release: v${{ steps.next.outputs.latest }} beta work promoted. See CHANGELOG.md."
          gh release create "v${BETA}" \
            --prerelease \
            --title "v${BETA} (beta)" \
            --notes "Opens the v${BETA%.*} beta channel; identical to v${STABLE}."
